<!DOCTYPE html>
<html>
<head>
    <title>Navbar</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
        }
        .topnav {
            background: #333;
            overflow: hidden;
        }
        .topnav a {
            float: left;
            color: #1affa3;
            padding: 14px;
        }
        .topnav a:hover {
            background: #ddd;
            color: black;
        }
        .active {
            background: #ffe066;
        }
        .slideshow {
            width: 100%;
            height: 400px;
            position: relative;
        }
        .slide {
            width: 100%;
            height: 400px;
            display: none;
        }
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="topnav">
        <a class="active" href="#">Home</a>
        <a href="#">About Us</a>
        <a href="#">Contact Us</a>
    </div>
<div class="slideshow">
<div class="slide">
<img src="https://images8.alphacoders.com/476/thumb-1920-476725.jpg">
        </div>
        <div class="slide">
            <img src="https://i.redd.it/luprfmefavp01.png">
        </div>
        <div class="slide">
            <img src="https://wallpapercave.com/wp/wp10648086.jpg">
        </div>
    </div>
    <script>
        let slideIndex = 0;
        let slides = document.getElementsByClassName("slide");
        function showSlides() {
            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            slideIndex++;
            if (slideIndex > slides.length) {
                slideIndex = 1;
            }
            slides[slideIndex - 1].style.display = "block";
            setTimeout(showSlides, 2500);
        }
        showSlides();
    </script>
</body>
</html>
