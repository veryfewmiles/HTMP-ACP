<!DOCTYPE html>
<html>

<head>
    <title>Flexbox Example</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .container {
            display: flex;
            justify-content: center;
            /* center horizontally */
            align-items: center;
            /* center vertically */
            height: 100vh;
            /* full screen height */
            gap: 20px;
        }

        .box {
            background-color: lightblue;
            padding: 30px;
            font-size: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
    </div>

</body>

</html>
